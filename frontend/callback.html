<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating - AIUB Sports Portal</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏆</text></svg>"
        type="image/svg+xml">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8eaf6 0%, #c5cae9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .callback-container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1976d2 0%, #2196f3 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }

        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
        }

        .status-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1976d2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-box {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .success-box {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .back-link {
            margin-top: 20px;
            display: none;
        }

        .back-link a {
            color: #1976d2;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="callback-container">
        <div class="logo">🏆</div>
        <h1>Authenticating with Microsoft</h1>
        <div class="status-message" id="statusMessage">Please wait while we verify your credentials...</div>
        <div class="spinner" id="spinner"></div>
        <div class="error-box" id="errorBox"></div>
        <div class="success-box" id="successBox"></div>
        <div class="back-link" id="backLink">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>

    <script src="api-config.js"></script>
    <script>
        async function handleCallback() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const error = urlParams.get('error');
                const errorDescription = urlParams.get('error_description');

                if (error) {
                    showError(`Authentication failed: ${errorDescription || error}`);
                    return;
                }

                if (!code) {
                    showError('No authorization code received. Please try again.');
                    return;
                }

                updateStatus('Exchanging authorization code...');

                // Single call to msauth/callback — handles all upsert + identity logic server-side
                const callbackResponse = await fetch(buildApiUrl(API_CONFIG.ENDPOINTS.MS_AUTH_CALLBACK), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                const callbackData = await callbackResponse.json();

                if (!callbackData.success) {
                    showError(callbackData.message || 'Authentication failed');
                    return;
                }

                const user = callbackData.user;

                updateStatus('Setting up your session...');

                // Store trusted identity data from server
                localStorage.setItem('isAuthenticated', 'true');
                localStorage.setItem('userEmail', user.email);
                localStorage.setItem('studentId', user.studentId);
                localStorage.setItem('azureId', user.azureId);
                localStorage.setItem('userName', user.name);
                localStorage.setItem('userRole', user.role || '');
                localStorage.setItem('profilePhotoUrl', user.profilePhotoUrl || '');
                localStorage.setItem('needsRoleSelection', user.needsRoleSelection ? 'true' : 'false');
                localStorage.setItem('msAccessToken', callbackData.accessToken);
                localStorage.setItem('userData', JSON.stringify(user));

                // Store JWT for API calls
                localStorage.setItem('jwtToken', callbackData.accessToken);
                if (callbackData.refreshToken) {
                    localStorage.setItem('jwtRefreshToken', callbackData.refreshToken);
                }

                // Decide destination
                if (user.profileCompleted === true) {
                    showSuccess(`Welcome back, ${user.name}! Redirecting to your dashboard...`);
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                } else {
                    showSuccess(`Welcome, ${user.name}! Let's set up your profile...`);
                    setTimeout(() => { window.location.href = 'profile-setup.html'; }, 1500);
                }

            } catch (err) {
                console.error('Callback error:', err);
                showError('An unexpected error occurred. Please try again.');
            }
        }

        function updateStatus(message) {
            document.getElementById('statusMessage').textContent = message;
        }

        function showError(message) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('statusMessage').style.display = 'none';
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = message;
            errorBox.style.display = 'block';
            document.getElementById('backLink').style.display = 'block';
        }

        function showSuccess(message) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('statusMessage').style.display = 'none';
            const successBox = document.getElementById('successBox');
            successBox.textContent = message;
            successBox.style.display = 'block';
        }

        window.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>

</html>
