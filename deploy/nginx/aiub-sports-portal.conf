# ═══════════════════════════════════════════════════════════
# AIUB Sports Portal — Nginx Configuration
# Reverse Proxy + Load Balancer + Static Files
# ═══════════════════════════════════════════════════════════
# 
# SETUP:
#   1. Copy to /etc/nginx/sites-available/aiub-sports-portal
#   2. ln -s /etc/nginx/sites-available/aiub-sports-portal /etc/nginx/sites-enabled/
#   3. Replace server_name _ with your actual domain
#   4. nginx -t && sudo systemctl reload nginx
#
# NOTE: SSL is handled by Cloudflare. This config uses HTTP (port 80).
#       Cloudflare → Nginx (HTTP) → Node.js app

# ─── Rate Limiting Zones ───
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# ─── Upstream (Application Servers) ───
upstream aiub_backend {
    # Server 1
    server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=30s;
    # Server 2 (uncomment when deploying second server)
    # server SERVER_2_IP:3000 weight=1 max_fails=3 fail_timeout=30s;

    keepalive 32;
}

server {
    listen 80;
    # [PRODUCTION] Replace _ with your domain:
    #   server_name sportsportal.com www.sportsportal.com;
    server_name _;

    # ─── Security Headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Frontend Static Files ───
    root /var/www/aiub-sports-portal/frontend;
    index login.html;

    # ─── Static Assets (cached) ───
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Health Check (no rate limit, for LB probes) ───
    location /health {
        proxy_pass http://aiub_backend/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── API Proxy ───
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://aiub_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Don't buffer large responses
        proxy_buffering off;
    }

    # ─── Auth API (stricter rate limit) ───
    location /api/msauth/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://aiub_backend/api/msauth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Legacy uploads (backward compat) ───
    location /uploads/ {
        proxy_pass http://aiub_backend/uploads/;
        proxy_set_header Host $host;
        expires 7d;
    }

    # ─── Frontend HTML Pages ───
    location / {
        try_files $uri $uri/ /login.html;
    }

    # ─── Error Pages ───
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ─── Request Size Limit ───
    client_max_body_size 10M;
}
